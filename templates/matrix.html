<!DOCTYPE html>
<html>
<head>
    <title>Activity Bingo Challenge</title>
    <style>

            text-align: center;
        }

            color: #00FF00;

        }

        .back-button {
            background-color: black;
            color: #00FF00;
            padding: 10px 20px;

            font-size: 16px;

            cursor: pointer;
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 0 10px #00FF00;
        }
        .back-button:hover {

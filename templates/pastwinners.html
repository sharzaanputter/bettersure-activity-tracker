<!DOCTYPE html>
<html>
<head>
    <title>Past Winners</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            background-color: rgb(24, 94, 115);
            color: white;
        }
        h1 {
            color: rgb(245, 132, 31);
        }
        .card {
            background-color: white;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: rgb(245, 132, 31);
            color: white;
        }
        .back-button {
            background-color: rgb(245, 132, 31);
            color: white;
            padding: 10px 20px;
            border: 2px solid rgb(245, 132, 31);
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-top: 20px;
        }
        .back-button:hover {
            background-color: rgb(24, 94, 115);
            border-color: rgb(24, 94, 115);
        }
    </style>
</head>
<body>
    <h1>🏆 Past Winners</h1>
    <div class="card">
        <table>
            <tr>
                <th>Month</th>
                <th>Winner</th>
            </tr>
            <tr>
                <td>February</td>
                <td>Louise</td>
            </tr>
            <tr>
                <td>March</td>
                <td>Rachel</td>
            </tr>
        </table>
    </div>
    <a href="/" class="back-button">Back to Tracker</a>
</body>
</html>
